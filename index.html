<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jr’s Barber Studio</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: 'Manrope', sans-serif;
      scroll-behavior: smooth;
    }

    section {
      margin: 0;
    }

    header {
      flex-direction: column;
      align-items: flex-start;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    nav {
      display: flex;
      gap: 15px;
    }

    nav a {
      position: relative;
      color: white;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 0%;
      height: 1px;
      background: white;
      transition: width 0.3s ease;
    }

    nav a:hover {
      color: #ccc;
    }

    nav a:hover::after {
      width: 100%;
    }

    #agenda a {
      color: white;
    }

    #agenda a:visited {
      color: white;
    }

    #agenda a:hover {
      background: white;
      color: black !important;
    }

    #contacto a img {
      transition: 0.3s;
    }

    #contacto a img:hover {
      transform: scale(1.1);
      opacity: 0.7;
    }

    /* 📱 RESPONSIVE */
    @media (max-width: 768px) {

      nav {
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }

      nav a {
        font-size: 12px;
      }

      h2 {
        font-size: 18px;
        text-align: center;
      }

      #agenda a {
        padding: 12px 25px;
        font-size: 14px;
      }

      #contacto img {
        max-height: 300px;
      }

      #contacto a img {
        width: 28px;
      }
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div>JR'S BARBER STUDIO</div>
    <nav>
      <a href="#servicios">Servicios Premium</a>
      <a href="#barberos">Maestros del estilo</a>
      <a href="#agenda">Reserva tu visita</a>
      <a href="#contacto">Contacto</a>
    </nav>
  </header>

  <!-- HERO -->
  <section style="
    height: 100vh;
    position: relative;
    overflow: hidden;
  ">

    <a id="slideLink" href="#" target="_blank">

      <img id="slide1" src="images/hero1.png" style="
        width: 100%;
        height: 100%;
        object-fit: contain;
        position: absolute;
        opacity: 1;
        transition: opacity 1s ease;
      ">

      <img id="slide2" src="images/hero2.png" style="
        width: 100%;
        height: 100%;
        object-fit: contain;
        position: absolute;
        opacity: 0;
        transition: opacity 1s ease;
      ">

    </a>

  </section>

  <!-- SERVICIOS -->
  <section id="servicios" style="
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  ">
    <h2 style="font-weight: 400; letter-spacing: 2px; margin-bottom: 20px;">
      SERVICIOS PREMIUM
    </h2>

    <img src="images/servicios.png" style="
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
    ">
  </section>

  <!-- BARBEROS -->
  <section id="barberos" style="
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  ">
    <h2 style="font-weight: 400; letter-spacing: 2px; margin-bottom: 30px;">
      MAESTROS DEL ESTILO
    </h2>

    <img src="images/barberos.png" style="
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
    ">
  </section>

  <!-- AGENDA -->
  <section id="agenda" style="
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  ">
    <h2 style="font-weight: 400; letter-spacing: 2px; margin-bottom: 20px;">
      RESERVA TU VISITA
    </h2>

    <a href="https://akkroestudiomx.github.io/barberform/" target="_blank" style="
      margin-top: 10px;
      padding: 14px 40px;
      border: 1px solid white;
      text-decoration: none;
      letter-spacing: 2px;
      transition: 0.3s;
    ">
      RESERVAR CITA
    </a>
  </section>

  <!-- CONTACTO -->
  <section id="contacto" style="
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  ">
    <img src="images/contacto.png" style="
      max-width: 100%;
      max-height: 550px;
      object-fit: contain;
      margin-bottom: 20px;
    ">

    <div style="display: flex; gap: 25px; margin-bottom: 15px;">
      <a href="https://instagram.com/" target="_blank">
        <img src="images/instagram.png" style="width: 32px;">
      </a>

      <a href="https://facebook.com/" target="_blank">
        <img src="images/facebook.png" style="width: 32px;">
      </a>

      <a href="https://tiktok.com/" target="_blank">
        <img src="images/tiktok.png" style="width: 32px;">
      </a>
    </div>

    <p style="font-size: 12px; color: #777;">
      © 2026 Jr’s Barber Studio. Todos los derechos reservados.
    </p>
  </section>

  <!-- WHATSAPP -->
  <a href="https://wa.me/5215515857956" target="_blank" style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    font-size: 24px;
    padding: 15px 18px;
    border-radius: 50%;
    text-decoration: none;
  ">
    💬
  </a>

  <!-- SCRIPT -->
  <script>
    const images = [
      "images/hero1.png",
      "images/hero2.png",
      "images/hero3.png"
    ];

    const links = [
      "https://akkroestudiomx.github.io/barberform/",
      "https://wa.me/c/5215515857956",
      "https://wa.me/5215515857956"
    ];

    let index = 0;
    let current = 1;

    const slide1 = document.getElementById("slide1");
    const slide2 = document.getElementById("slide2");
    const slideLink = document.getElementById("slideLink");

    slideLink.href = links[0];

    setInterval(() => {
      index = (index + 1) % images.length;

      if (current === 1) {
        slide2.src = images[index];
        slide2.style.opacity = 1;
        slide1.style.opacity = 0;
        current = 2;
      } else {
        slide1.src = images[index];
        slide1.style.opacity = 1;
        slide2.style.opacity = 0;
        current = 1;
      }

      slideLink.href = links[index];

    }, 3000);
  </script>

</body>
</html>
