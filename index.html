<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Jr’s Barber Studio</title>

  <!-- Fuente Manrope -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: 'Manrope', sans-serif;
      scroll-behavior: smooth;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <div>LOGO</div>
    <nav>
      <a href="#servicios">Servicios Premium</a>
      <a href="#barberos">Maestros del estilo</a>
      <a href="#agenda">Reserva tu visita</a>
      <a href="#contacto">Contacto</a>
    </nav>
  </header>

<section style="
  height: 100vh;
  position: relative;
  overflow: hidden;
">

  <a id="slideLink" href="#" target="_blank">

    <img id="slide1" src="images/hero1.png" style="
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      opacity: 1;
      transition: opacity 1s ease;
    ">

    <img id="slide2" src="images/hero2.png" style="
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      opacity: 0;
      transition: opacity 1s ease;
    ">

  </a>

</section>

  <!-- Secciones -->
  <section id="servicios">Servicios Premium</section>
  <section id="barberos">Maestros del estilo</section>
  <section id="agenda">Reserva tu visita</section>
  <section id="contacto">Contacto</section>

<script>
  const images = [
    "images/hero1.png",
    "images/hero2.png",
    "images/hero3.png"
  ];

  const links = [
    "https://akkroestudiomx.github.io/barberform/",
    "https://wa.me/c/5215515857956",
    "https://wa.me/5215515857956"
  ];

  let index = 0;
  const slide = document.getElementById("slide");
  const slideLink = document.getElementById("slideLink");

  setInterval(() => {
    index = (index + 1) % images.length;
    slide.src = images[index];
    slideLink.href = links[index];
  }, 3000);
</script>
  
</body>
</html>
