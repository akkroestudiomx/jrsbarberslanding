<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jr’s Barber Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Manrope',sans-serif;
  scroll-behavior:smooth;
}

section{
  margin:0;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:rgba(0,0,0,.70);
  backdrop-filter:blur(10px);
  z-index:1000;
}

nav{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

nav a{
  position:relative;
  color:#fff;
  text-decoration:none;
  font-size:14px;
  letter-spacing:1px;
  white-space:nowrap;
}

nav a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-5px;
  width:0%;
  height:1px;
  background:#fff;
  transition:width .3s ease;
}

nav a:hover::after{
  width:100%;
}

nav a:hover{
  color:#ccc;
}

/* HERO */
#hero{
  height:100vh;
  margin-top:110px;
  position:relative;
  overflow:hidden;
}

.slide{
  position:absolute;
  inset:0;

  background-size:cover;
  background-repeat:no-repeat;

  background-position:left center;

  opacity:0;
  transition:opacity 1s ease;
}

.slide.active{
  opacity:1;
}

#slideLink{
  position:absolute;
  inset:0;
  z-index:5;
}

/* SECCIONES */
.section-center{
  padding:60px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h2{
  font-weight:400;
  letter-spacing:2px;
  margin-bottom:25px;
  text-align:center;
}

/* BOTON */
#agenda a{
  color:#fff;
  text-decoration:none;
  padding:14px 40px;
  border:1px solid #fff;
  letter-spacing:2px;
  transition:.3s;
}

#agenda a:hover{
  background:#fff;
  color:#000;
}

/* ICONOS */
#contacto a img{
  transition:.3s;
}

#contacto a img:hover{
  transform:scale(1.1);
  opacity:.7;
}

/* RESPONSIVE */
@media (max-width:900px){

  header{
    flex-direction:column;
    align-items:flex-start;
  }

  nav{
    margin-top:10px;
    gap:10px;
  }

  nav a{
    font-size:12px;
  }

  .slide{
    background-size:cover;
    background-position:8% center;
  }
  
  #hero{
    height:80vh;
  }
}

@media (max-width:700px){

  .slide{
    background-size:cover;
    background-position:3% center;
  }

  #hero{
    height:60vh;
  }

  h2{
    font-size:18px;
  }
}

@media (max-width:480px){

  .slide{
    background-size:cover;
    background-position:0% center;
  }

  #hero{
    height:40vh;
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div>JR'S BARBER STUDIO</div>

  <nav>
    <a href="#servicios">Servicios Premium</a>
    <a href="#barberos">Maestros del estilo</a>
    <a href="#agenda">Reserva tu visita</a>
    <a href="#contacto">Contacto</a>
  </nav>
</header>

<!-- HERO -->
<section id="hero">

  <div id="slide1" class="slide active"
       style="background-image:url('images/hero1.png');">
  </div>

  <div id="slide2" class="slide"
       style="background-image:url('images/hero2.png');">
  </div>

  <a id="slideLink" href="#" target="_blank"></a>

</section>

<!-- SERVICIOS -->
<section id="servicios" class="section-center">

  <h2>SERVICIOS PREMIUM</h2>

  <img src="images/servicios.png"
       style="max-width:100%; max-height:80vh; object-fit:contain;">

</section>

<!-- BARBEROS -->
<section id="barberos" class="section-center">

  <h2>MAESTROS DEL ESTILO</h2>

  <img src="images/barberos.png"
       style="max-width:100%; max-height:80vh; object-fit:contain;">

</section>

<!-- AGENDA -->
<section id="agenda" class="section-center">

  <h2>RESERVA TU VISITA</h2>

  <a href="https://akkroestudiomx.github.io/barberform/" target="_blank">
    RESERVAR CITA
  </a>

</section>

<!-- CONTACTO -->
<section id="contacto" class="section-center" style="padding-bottom:40px;">

  <img src="images/contacto.png"
       style="max-width:100%; max-height:550px; object-fit:contain; margin-bottom:20px;">

  <div style="display:flex; gap:25px; margin-bottom:15px;">

    <a href="https://instagram.com/" target="_blank">
      <img src="images/instagram.png" style="width:32px;">
    </a>

    <a href="https://facebook.com/" target="_blank">
      <img src="images/facebook.png" style="width:32px;">
    </a>

    <a href="https://tiktok.com/" target="_blank">
      <img src="images/tiktok.png" style="width:32px;">
    </a>

  </div>

  <p style="font-size:12px; color:#777;">
    © 2026 Jr’s Barber Studio. Todos los derechos reservados.
  </p>

</section>

<!-- WHATSAPP -->
<a href="https://wa.me/5215515857956"
target="_blank"
style="
position:fixed;
bottom:20px;
right:20px;
background:#fff;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 15px rgba(0,0,0,.3);
z-index:999;
">

<img src="images/whatsapp.png" style="width:30px;">

</a>

<!-- SCRIPT -->
<script>
const images = [
  "images/hero1.png",
  "images/hero2.png",
  "images/hero3.png"
];

const links = [
  "https://akkroestudiomx.github.io/barberform/",
  "https://wa.me/c/5215515857956",
  "https://wa.me/5215515857956"
];

let index = 0;
let current = 1;

const slide1 = document.getElementById("slide1");
const slide2 = document.getElementById("slide2");
const slideLink = document.getElementById("slideLink");

slideLink.href = links[0];

setInterval(() => {

  index = (index + 1) % images.length;

  if(current === 1){

    slide2.style.backgroundImage = `url('${images[index]}')`;
    slide2.classList.add("active");
    slide1.classList.remove("active");
    current = 2;

  }else{

    slide1.style.backgroundImage = `url('${images[index]}')`;
    slide1.classList.add("active");
    slide2.classList.remove("active");
    current = 1;
  }

  slideLink.href = links[index];

}, 3000);
</script>

</body>
</html>
