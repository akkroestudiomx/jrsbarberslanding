<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Jr’s Barber Studio</title>

  <!-- Fuente Manrope -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: 'Manrope', sans-serif;
      scroll-behavior: smooth;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    nav {
      display: flex;
      gap: 25px;
    }

    nav a {
  position: relative;
  color: white;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 1px;
  white-space: nowrap;
}

    nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 0%;
      height: 1px;
      background: white;
      transition: width 0.3s ease;
    }

    nav a:hover {
      color: #cccccc;
    }

    nav a:hover::after {
      width: 100%;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div>JR'S BARBER STUDIO</div>
    <nav>
      <a href="#servicios">Servicios Premium</a>
      <a href="#barberos">Maestros del estilo</a>
      <a href="#agenda">Reserva tu visita</a>
      <a href="#contacto">Contacto</a>
    </nav>
  </header>

  <!-- HERO / CARRUSEL -->
  <section style="
    height: 100vh;
    position: relative;
    overflow: hidden;
  ">

    <a id="slideLink" href="#" target="_blank">

      <img id="slide1" src="images/hero1.png" style="
        width: 100%;
        height: 100%;
        object-fit: contain;
        position: absolute;
        opacity: 1;
        transition: opacity 1s ease;
      ">

      <img id="slide2" src="images/hero2.png" style="
        width: 100%;
        height: 100%;
        object-fit: contain;
        position: absolute;
        opacity: 0;
        transition: opacity 1s ease;
      ">

    </a>

  </section>

  <!-- SECCIONES -->
  <section id="servicios" style="height:100vh;">Servicios Premium</section>
  <section id="barberos" style="height:100vh;">Maestros del estilo</section>
  <section id="agenda" style="height:100vh;">Reserva tu visita</section>
  <section id="contacto" style="height:100vh;">Contacto</section>

  <!-- SCRIPT CARRUSEL -->
  <script>
    const images = [
      "images/hero1.png",
      "images/hero2.png",
      "images/hero3.png"
    ];

    const links = [
      "https://akkroestudiomx.github.io/barberform/",
      "https://wa.me/c/5215515857956",
      "https://wa.me/5215515857956"
    ];

    let index = 0;
    let current = 1;

    const slide1 = document.getElementById("slide1");
    const slide2 = document.getElementById("slide2");
    const slideLink = document.getElementById("slideLink");

    slideLink.href = links[0];

    setInterval(() => {
      index = (index + 1) % images.length;

      if (current === 1) {
        slide2.src = images[index];
        slide2.style.opacity = 1;
        slide1.style.opacity = 0;
        current = 2;
      } else {
        slide1.src = images[index];
        slide1.style.opacity = 1;
        slide2.style.opacity = 0;
        current = 1;
      }

      slideLink.href = links[index];

    }, 3000);
  </script>

</body>
</html>
