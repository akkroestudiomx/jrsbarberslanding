<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Jr’s Barber Studio</title>

  <!-- Fuente Manrope -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: 'Manrope', sans-serif;
      scroll-behavior: smooth;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <div>LOGO</div>
    <nav>
      <a href="#servicios">Servicios Premium</a>
      <a href="#barberos">Maestros del estilo</a>
      <a href="#agenda">Reserva tu visita</a>
      <a href="#contacto">Contacto</a>
    </nav>
  </header>

<section style="
  height: 100vh;
  position: relative;
  overflow: hidden;
">

  <img id="slide" src="images/hero1.png" style="
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: absolute;
  ">

</section>

  <!-- Secciones -->
  <section id="servicios">Servicios Premium</section>
  <section id="barberos">Maestros del estilo</section>
  <section id="agenda">Reserva tu visita</section>
  <section id="contacto">Contacto</section>

  <script>
  const images = [
    "images/hero1.png",
    "images/hero2.png",
    "images/hero3.png"
  ];

  let index = 0;
  const slide = document.getElementById("slide");

  setInterval(() => {
    index = (index + 1) % images.length;
    slide.src = images[index];
  }, 3000);
</script>
  
</body>
</html>
